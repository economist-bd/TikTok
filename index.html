        { title: "কল টু অ্যাকশন (CTA) ব্যবহার করুন", desc: ["ভিডিওর শেষে দর্শকদের কিছু করতে বলুন। যেমন: 'পরবর্তী পার্টের জন্য ফলো করুন' বা 'আপনার মতামত কমেন্টে জানান'।", "দর্শকরা নিজে থেকে লাইক বা শেয়ার করতে ভুলে যেতে পারে, তাই তাদের মনে করিয়ে দেওয়া জরুরি।"], tip: "CTA যত স্পেসিফিক হবে, কাজ করার সম্ভাবনা তত বাড়বে।" },
        { title: "টিকটকের নিজস্ব ইফেক্ট এবং ফিল্টার", desc: ["টিকটকের ট্রেন্ডিং ইফেক্ট (Effects) এবং ফিল্টার ব্যবহার করলে অ্যালগরিদম সেই ভিডিওকে পুশ করে।", "নতুন কোনো ফিল্টার এলে দ্রুত সেটি ব্যবহার করে ভিডিও বানানোর চেষ্টা করুন।"], tip: "গ্রিন স্ক্রিন (Green Screen) ইফেক্ট ব্যবহার করে দারুণ সব শিক্ষামূলক ভিডিও বানানো যায়।" },
        { title: "অন্যান্য সোশ্যাল মিডিয়ায় শেয়ার করুন", desc: ["আপনার টিকটক ভিডিওগুলো ইন্সটাগ্রাম রিলস, ইউটিউব শর্টস এবং ফেসবুকে শেয়ার করুন।", "টিকটক ভিডিওর লিংক আপনার বন্ধুদের বা বিভিন্ন গ্রুপে মেসেজ করে পাঠাতে পারেন।"], tip: "এতে অন্য প্ল্যাটফর্ম থেকে নতুন ফলোয়ার টিকটকে যুক্ত হবে।" },
        { title: "লাইভে (Live) আসুন", desc: ["১০০০ ফলোয়ার হলে টিকটকে লাইভ করা যায়। নিয়মিত লাইভে আসলে ফলোয়ারদের সাথে সরাসরি কথা বলা যায়।", "লাইভে প্রশ্ন-উত্তর পর্ব বা আপনার কাজের পেছনের দৃশ্য দেখাতে পারেন।"], tip: "লাইভ করলে টিকটক অ্যালগরিদম অ্যাকাউন্টটির রিচ বাড়িয়ে দেয়।" },
        { title: "অন্য ক্রিয়েটরদের সাথে কোলাবোরেশন", desc: ["আপনার নিস (Niche) এর সমপর্যায়ের অন্যান্য টিকটকারদের সাথে মিলে ভিডিও বানান।", "একসাথে ভিডিও বানালে একে অপরের ফলোয়াররা নতুন ক্রিয়েটরকে চেনার সুযোগ পায়।"], tip: "এটি ফলোয়ার বাড়ানোর অন্যতম দ্রুত উপায়।" },

        // 21-30
        { title: "সঠিক সময়ে (Right Time) ভিডিও আপলোড", desc: ["সবসময় একই সময়ে ভিডিও আপলোড করলে ভালো ফলাফল পাওয়া যায়।", "সাধারণত বাংলাদেশে সন্ধ্যা ৭টা থেকে রাত ১০টা পর্যন্ত টিকটকে সবচেয়ে বেশি মানুষ অ্যাক্টিভ থাকে।"], tip: "আপনার অ্যানালিটিক্স চেক করে নিজের অ্যাকাউন্টের সঠিক সময় বের করুন।" },
        { title: "ট্রানজিশন (Transition) ইফেক্টের ব্যবহার", desc: ["ক্লিন এবং স্মুথ ট্রানজিশন ভিডিওকে অনেক বেশি প্রফেশনাল এবং আকর্ষণীয় করে তোলে।", "জামাকাপড় পরিবর্তন বা লোকেশন পরিবর্তনের সময় হাতের জাদুতে ট্রানজিশন করুন।"], tip: "ইউটিউবে ট্রানজিশনের টিউটোরিয়াল দেখে আইডিয়া নিতে পারেন।" },
        { title: "আকর্ষণীয় ভিডিও কাভার (Cover) নির্বাচন", desc: ["প্রোফাইলে গেলে মানুষ সবার আগে ভিডিওর কাভার বা থাম্বনেইল দেখে।", "ভিডিও আপলোডের সময় সবচেয়ে আকর্ষণীয় ফ্রেমটি কাভার হিসেবে সিলেক্ট করুন এবং একটি টাইটেল লিখে দিন।"], tip: "প্রোফাইল দেখতে গোছানো লাগলে ফলোয়ার বাড়ার সম্ভাবনা বাড়ে।" },
        { title: "ভিডিও সিরিজ বা প্লেলিস্ট তৈরি", desc: ["'কীভাবে সফল হবেন - পর্ব ১', 'পর্ব ২' - এভাবে সিরিজ আকারে ভিডিও বানালে দর্শকরা পরবর্তী পর্বের জন্য অপেক্ষা করে।", "সিরিজ ভিডিও মানুষকে আপনার প্রোফাইলে বারবার ফিরিয়ে আনে।"], tip: "টিকটকের প্লেলিস্ট ফিচারটি ব্যবহার করে একই বিষয়ের ভিডিওগুলো একসাথে রাখুন।" },
        { title: "কমিউনিটি গাইডলাইন মেনে চলা", desc: ["টিকটকের নিয়ম বা কমিউনিটি গাইডলাইন ভাঙলে ভিডিও ডিলিট হতে পারে বা অ্যাকাউন্ট ব্যান হতে পারে।", "কপিরাইট মিউজিক, হিংসাত্মক কথা, বা ক্ষতিকর কোনো কন্টেন্ট আপলোড করা থেকে বিরত থাকুন।"], tip: "গাইডলাইন ভায়োলেশন (Shadowban) আপনার অ্যাকাউন্টের গ্রোথ থামিয়ে দেয়।" },
        { title: "নিজের আসল ব্যক্তিত্ব তুলে ধরা", desc: ["অন্যকে হুবহু নকল না করে ক্যামেরার সামনে নিজের আসল ব্যক্তিত্ব (Authenticity) প্রকাশ করুন।", "মানুষ অরিজিনাল জিনিস পছন্দ করে। আপনার বলার স্টাইল বা হাসির ধরনই আপনার সিগনেচার হতে পারে।"], tip: "ভুল হলে ঘাবড়াবেন না, সাধারণ মানুষ পারফেকশনের চেয়ে রিয়েলিটি বেশি পছন্দ করে।" },
        { title: "দর্শকদের নতুন কিছু শেখান", desc: ["যেকোনো বিষয়— আইসিটি, গণিত, রান্নার টিপস বা এডিটিং— যা আপনি ভালো পারেন, তা অন্যদের শেখান।", "শিক্ষামূলক কন্টেন্টের শেয়ার অনেক বেশি হয় এবং এটি আপনার একটি ব্র্যান্ড ভ্যালু তৈরি করে।"], tip: "'কীভাবে...' (How to) দিয়ে শুরু হওয়া ভিডিওগুলো মানুষ সেভ করে রাখে।" },
        { title: "ক্লিফহ্যাঙ্গার (Cliffhanger) বা সাসপেন্স তৈরি", desc: ["ভিডিওর মাঝখানে বা শেষে এমন একটা সাসপেন্স রাখুন যাতে দর্শক ভিডিওটি দ্বিতীয়বার দেখতে বাধ্য হয়।", "যেমন: '৩ নাম্বার পয়েন্টটি সবচেয়ে বেশি জরুরি, যা আমি শেষে বলছি।'"], tip: "এটি আপনার ভিডিওর 'ওয়াচ টাইম' বহুগুণ বাড়িয়ে দেয়।" },
        { title: "ক্যামেরার পেছনের দৃশ্য (Behind the Scenes)", desc: ["ভিডিওগুলো কীভাবে তৈরি করছেন তার পেছনের মজার ঘটনাগুলো শেয়ার করুন।", "মানুষ আপনার কাজের পেছনের পরিশ্রম বা ভুলগুলো (Bloopers) দেখতে খুব মজা পায়।"], tip: "মাঝে মাঝে এই ধরনের ভিডিও ফলোয়ারদের সাথে সম্পর্ক দৃঢ় করে।" },
        { title: "প্রশ্ন-উত্তর (Q&A) পর্ব তৈরি করা", desc: ["টিকটকের Q&A ফিচারটি অন করে রাখুন। ফলোয়াররা প্রশ্ন করলে সেগুলো নিয়ে ভিডিও তৈরি করুন।", "এটি কনটেন্ট আইডিয়ার একটি বড় উৎস। আপনাকে ভাবতে হবে না কী নিয়ে ভিডিও বানাবেন।"], tip: "প্রশ্নকারীর কমেন্ট ভিডিওর স্ক্রিনে পিন করে উত্তর দিন।" },

        // 31-40
        { title: "ট্রেন্ডের শুরুতে অংশগ্রহণ করুন", desc: ["কোনো নতুন ডান্স বা মিউজিক ট্রেন্ড শুরু হওয়ামাত্রই তাতে অংশ নিন।", "দেরি করে ট্রেন্ডে গা ভাসালে ততক্ষণে ওই বিষয়টি মানুষের কাছে পুরোনো হয়ে যায়।"], tip: "'Discover' বা 'For You' পেজ স্ক্রল করে নতুন ট্রেন্ড খুঁজে বের করুন।" },
        { title: "ভয়েসওভার (Voiceover) ব্যবহার করা", desc: ["ভিডিওর সাথে সাথে কথা না বলে, আগে সুন্দর দৃশ্য রেকর্ড করে পরে ভয়েসওভার দিন।", "ভ্রমণ বা রান্নার ভিডিওর ক্ষেত্রে এটি খুব চমৎকার কাজ করে।"], tip: "টিকটকের বিল্ট-ইন ভয়েসওভার টুল দিয়ে সহজেই এটি করা যায়।" },
        { title: "ভিডিওর মাঝখানে প্রশ্ন করা", desc: ["দর্শকদের মনোযোগ ধরে রাখতে ভিডিওর ঠিক মাঝখানে একটি প্রাসঙ্গিক প্রশ্ন ছুঁড়ে দিন।", "যেমন: 'আপনি কি এর আগে এই অ্যাপটি ব্যবহার করেছেন?'"], tip: "এটি দর্শকদের সাথে সাথে কমেন্ট বক্সে গিয়ে লিখতে উৎসাহিত করে।" },
        { title: "ভিডিওটি লুপেবল (Loopable) করা", desc: ["ভিডিওর শেষ বাক্যটি এমনভাবে বলুন যা ভিডিওর প্রথম বাক্যের সাথে মিলে যায়।", "এতে ভিডিওটি শেষ হয়ে আবার শুরু হলে দর্শক বুঝতে পারে না, তারা দুই-তিনবার দেখে ফেলে।"], tip: "অ্যালগরিদম ভাবে ভিডিওটি খুব ভালো, তাই বারবার দেখা হচ্ছে।" },

    // ==========================================
    // INJECT SLIDES INTO HTML
    // ==========================================
    const slideContainer = document.querySelector('.swiper-wrapper');

    tiktokTips.forEach((tip, index) => {
        const slideNumber = index + 1;
        
        // Mapping descriptions to bullet points for a clean left-aligned look
        const bulletsHTML = tip.desc.map(p => `
            <div class="flex items-start mb-4">
                <span class="mr-3 text-3xl leading-none mt-1 text-white opacity-90">•</span> 
                <span class="opacity-95 leading-snug">${p}</span>
            </div>
        `).join('');

        const slideHTML = `
            <div class="swiper-slide">
                
                <!-- Inner Colorful Capture Area -->
                <div id="slide-${slideNumber}" class="capture-wrapper p-6 md:p-8">
                    
                    <!-- Top Bar: Badge and Page Number -->
                    <div class="flex justify-between items-center w-full z-10 mb-6 md:mb-8">
                        <span class="bg-[#FF0050] text-white text-sm md:text-base font-extrabold px-5 py-2 rounded-full shadow-lg border-2 border-white/20 uppercase tracking-wide">টিপস ${slideNumber}</span>
                        <span class="text-white font-extrabold text-xl md:text-2xl text-shadow-hard">${slideNumber} / ১০০</span>
                    </div>

                    <!-- Main Text Content (Left Aligned & Large) -->
                    <div class="flex-grow flex flex-col justify-start items-start text-left w-full pt-2">
                        
                        <!-- Title -->
                        <h2 class="text-3xl md:text-4xl lg:text-5xl font-extrabold text-white mb-8 leading-tight text-shadow-hard">${tip.title}</h2>
                        
                        <!-- Bullet Points -->
                        <div class="text-white text-xl md:text-2xl w-full font-medium text-shadow-soft">
                            ${bulletsHTML}
                        </div>

                        <!-- Pro-Tip Box (Glassmorphism Effect) -->
                        <div class="bg-black/30 backdrop-blur-md p-5 md:p-6 rounded-2xl border-l-4 border-tiktok-cyan mt-auto mb-10 text-left shadow-2xl w-full text-white text-lg md:text-xl font-medium border-t border-r border-b border-white/10">
                            <i class="fas fa-lightbulb text-yellow-400 mr-2 text-2xl align-middle"></i> 
                            <strong class="text-tiktok-cyan tracking-wide">প্রো-টিপ:</strong> <span class="opacity-90">${tip.tip}</span>
                        </div>
                        
                    </div>

                    <!-- Watermark -->
                    <div class="absolute bottom-5 left-0 w-full text-center text-white/50 text-sm md:text-base font-semibold tracking-widest uppercase">@আপনার_ইউজারনেম</div>
                </div>
                
                <!-- Download Button (Outside capture area) -->
                <button onclick="downloadSlide('slide-${slideNumber}')" class="download-btn mt-2 bg-[#111] hover:bg-gray-800 text-white rounded-2xl w-full font-bold border border-gray-700 transition flex justify-center items-center gap-3 shadow-[0_5px_15px_rgba(0,0,0,0.5)]">
                    <i class="fas fa-camera text-tiktok-cyan text-xl"></i> ছবি হিসেবে সেভ করুন
                </button>
            </div>
        `;
        slideContainer.insertAdjacentHTML('beforeend', slideHTML);
    });

    // ==========================================
    // INITIALIZE SWIPER & FUNCTIONS
    // ==========================================
    const swiper = new Swiper(".mySwiper", {
        direction: "horizontal", 
        loop: false,
        grabCursor: true,
        keyboard: { enabled: true },
    });

    function startReading() {
        swiper.slideNext();
    }

    // High Quality Image Download Logic
    function downloadSlide(slideId) {
        const captureDiv = document.getElementById(slideId);
        const loadingOverlay = document.getElementById('loading-overlay');
        
        loadingOverlay.style.display = 'flex';

        html2canvas(captureDiv, {
            scale: 3, // Very high scale for crisp text on social media
            useCORS: true,
            backgroundColor: null, 
            logging: false
        }).then(canvas => {
            const imgData = canvas.toDataURL("image/jpeg", 0.95);
            const link = document.createElement('a');
            link.href = imgData;
            link.download = `tiktok-tip-${slideId}.jpg`;
            
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            
            loadingOverlay.style.display = 'none';
        }).catch(err => {
            console.error("Error creating image:", err);
            loadingOverlay.style.display = 'none';
            alert('ছবি ডাউনলোড করতে সমস্যা হয়েছে। দয়া করে আবার চেষ্টা করুন।');
        });
    }

</script>

</body>
</html>
